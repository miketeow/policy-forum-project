services:
  db:
    image: postgres:18-alpine
    container_name: policy-forum-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: policy_forum
    volumes:
      - pgdata:/var/lib/postgresql/data
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # The Web UI for you to view traces
      - "4318:4318" # The OTLP HTTP receiver for Go to send data

volumes:
  pgdata:
